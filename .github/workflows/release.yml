name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    environment: public
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: typecheck
        run: npm run check

      - name: unit tests
        run: npm test

      - name: publish
        run: npm publish --provenance --access public
